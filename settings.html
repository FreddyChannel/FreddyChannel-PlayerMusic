<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freddy Channel Settings</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#101826;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#00d8ff;
}

.card{
    background:#1b2638;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.card h2{
    color:#00d8ff;
    margin-top:0;
}

select,input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    margin-top:5px;
    margin-bottom:15px;
}

.option{
    margin:10px 0;
}

button{
    background:#00d8ff;
    color:black;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

.footer{
    text-align:center;
    color:#aaa;
    margin-top:30px;
}
</style>

</head>
<body>

<div class="container">

<h1>⚙️ Freddy Channel Settings</h1>

<div class="card">
<h2>👤 Account</h2>

<label>Username</label> <input type="text" placeholder="Enter your username">

<label>Email</label> <input type="email" placeholder="Enter your email">

<label>Password</label> <input type="password" placeholder="Enter your password">

<button>Create Account</button>

</div>

<div class="card">
<h2>🌐 Language</h2>

<select>
<option>English</option>
<option>Português (Portugal)</option>
<option>Português (Brazil)</option>
<option>Español</option>
<option>Français</option>
<option>Deutsch</option>
</select>
</div>

<div class="card">
<h2>🎨 Theme</h2>

<select>
<option selected>Blue Mode (Default)</option>
<option>Dark Mode</option>
<option>Light Mode</option>
</select>
</div>

<div class="card">
<h2>🔔 Notifications</h2>

<div class="option">
<input type="checkbox" checked> New Videos
</div>

<div class="option">
<input type="checkbox" checked> Channel Updates
</div>

<div class="option">
<input type="checkbox" checked> Community News
</div>

</div>

<div class="card">
<h2>🔒 Privacy</h2>

<div class="option">
<input type="checkbox" checked> Show Profile Publicly
</div>

<div class="option">
<input type="checkbox" checked> Enable Security Alerts
</div>

<div class="option">
<input type="checkbox" checked> Allow Friend Requests
</div>

<div class="option">
<input type="checkbox"> Share Activity Status
</div>

</div>

<div class="card">
<h2>ℹ️ About</h2>

<p>Freddy Channel</p>
<p>© Copyright - 2026</p>

</div>

<div class="footer">
Freddy Channel Settings
</div>

</div>

</body>
</html>
