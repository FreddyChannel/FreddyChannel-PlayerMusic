<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freddy Channel Music</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#101826;color:white}
.container{max-width:900px;margin:auto;padding:20px}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#00d8ff}
.player{background:#1b2638;border-radius:15px;padding:20px}
#currentSong{font-size:20px;margin-bottom:10px}
audio{width:100%}
.controls{display:flex;justify-content:center;gap:10px;margin-top:15px;flex-wrap:wrap}
button{background:#00d8ff;border:none;border-radius:8px;padding:10px 18px;font-size:16px;cursor:pointer;font-weight:bold}
.playlist{margin-top:20px;max-height:500px;overflow-y:auto}
.song{padding:12px;margin:5px 0;border-radius:10px;background:#243248;cursor:pointer}
.song:hover{background:#30445f}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎵 Freddy Channel Music</h1>
<p>Playlist Oficial • 30 Faixas</p>
</div>
<div class="player">
<div id="currentSong">Selecione uma música</div>
<audio id="audio" controls></audio>
<div class="controls">
<button onclick="prevSong()">⏮️ Anterior</button>
<button onclick="togglePlay()">▶️ Play/Pause</button>
<button onclick="nextSong()">⏭️ Próxima</button>
</div>
<div class="playlist" id="playlist"></div>
</div>
</div>
<script>
const songs = [
{
title:"🌍 Planeta Furry",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/Planeta%20Furry.mp3"
},
{
title:"⭐ O Grande Sonho",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/1.%20O%20Grande%20Sonho.mp3"
},
{
title:"🐰 Missão Páscoa Pixelada",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/2.%20Miss%C3%A3o%20P%C3%A1scoa%20Pixelada.mp3"
},
{
title:"🏆 Jogo Mundial",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/3.%20Jogo%20Mundial.mp3"
},
{
title:"🎉 Meu Dia Animado",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/4.%20Meu%20Dia%20Animado.mp3"
},
{
title:"🌕 Luar da Caçada",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/5.%20Luar%20da%20Ca%C3%A7ada.mp3"
},
{
title:"❄️ Temporada de Inverno",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/6.%20Temporada%20de%20Inverno.mp3"
},
{
title:"⛅ Novo Amanhecer do Freddy",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/7.%20Novo%20Amanhecer%20do%20Freddy.mp3"
},
{
title:"🏖️ Patas para Cima",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/8.%20Patas%20para%20Cima.mp3"
},
{
title:"🚀 Profissões do Amanhã",
file:"https://raw.githubusercontent.com/FreddyChannel/FreddyChannel-PlayerMusic/main/music/9.%20Profiss%C3%B5es%20do%20Amanh%C3%A3.mp3"
}
];

const audio=document.getElementById("audio");
const playlist=document.getElementById("playlist");
const currentSongText=document.getElementById("currentSong");
let currentIndex=0;
function loadSong(i){currentIndex=i;audio.src=songs[i].file;currentSongText.textContent=songs[i].title;}
function nextSong(){currentIndex=(currentIndex+1)%songs.length;loadSong(currentIndex);audio.play();}
function prevSong(){currentIndex=(currentIndex-1+songs.length)%songs.length;loadSong(currentIndex);audio.play();}
function togglePlay(){audio.paused?audio.play():audio.pause();}
audio.addEventListener("ended",nextSong);
songs.forEach((song,index)=>{
 const div=document.createElement("div");
 div.className="song";
 div.textContent=song.title;
 div.onclick=()=>{loadSong(index);audio.play();};
 playlist.appendChild(div);
});
loadSong(0);
</script>
</body>
</html>
