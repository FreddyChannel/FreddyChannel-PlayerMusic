body{margin:0;font-family:Arial,sans-serif;background:#101826;color:white}
.container{max-width:900px;margin:auto;padding:20px}
.header{text-align:center;margin-bottom:20px}
.header h1{color:#00d8ff}
.player{background:#1b2638;border-radius:15px;padding:20px}
#currentSong{font-size:20px;margin-bottom:10px}
audio{width:100%}
.controls{display:flex;justify-content:center;gap:10px;margin-top:15px;flex-wrap:wrap}
button{background:#00d8ff;border:none;border-radius:8px;padding:10px 18px;font-size:16px;cursor:pointer;font-weight:bold}
.playlist{margin-top:20px;max-height:500px;overflow-y:auto}
.song{padding:12px;margin:5px 0;border-radius:10px;background:#243248;cursor:pointer}
.song:hover{background:#30445f}

<button onclick="prevSong()">⏮️ PREVIOUS</button>
<button onclick="togglePlay()">▶️ PLAY</button>

<div class="playlist" id="playlist"></div>
</div>
</div>

const audio=document.getElementById("audio");
const playlist=document.getElementById("playlist");
const currentSongText=document.getElementById("currentSong");
let currentIndex=0;
function loadSong(i){currentIndex=i;audio.src=songs[i].file;currentSongText.textContent=songs[i].title;}
function nextSong(){currentIndex=(currentIndex+1)%songs.length;loadSong(currentIndex);audio.play();}
function prevSong(){currentIndex=(currentIndex-1+songs.length)%songs.length;loadSong(currentIndex);audio.play();}
function togglePlay(){audio.paused?audio.play():audio.pause();}
audio.addEventListener("ended",nextSong);
songs.forEach((song,index)=>{
 const div=document.createElement("div");
 div.className="song";
 div.textContent=song.title;
 div.onclick=()=>{loadSong(index);audio.play();};
 playlist.appendChild(div);
});
loadSong(0);
</script>
